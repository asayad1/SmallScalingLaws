  - name: gpt_5l_96d
    n_layer: 5
    n_head: 4
    n_embd: 96
    mlp_ratio: 4.0

compute:
  budgets: [1.2e12, 2.0e12, 3.2e12, 5.0e12, 8.0e12, 1.3e13, 2.0e13, 3.2e13, 5.0e13]

planning:
  min_steps_per_run: 50
  max_steps_per_run: 30000

training:
  block_size: 128
  batch_size: 16
  grad_accum_steps: 1
  learning_rate: 0.0006
  weight_decay: 0.1
  betas: [0.9, 0.95]
  dropout: 0.1
  grad_clip: 1.0
  warmup_fraction: 0.05
  min_lr_ratio: 0.1
  fixed_schedule_horizon: median_per_budget
  use_amp: true
  save_last_checkpoint: false

evaluation:
  eval_interval_steps: 50
  eval_batch_size: 16
  eval_batches: 20
  test_eval_batches: 20
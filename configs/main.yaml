experiment:
  name: main_v2
  out_dir: outputs/main_v2
  device: auto
  cpu_num_threads: 1
  seeds: [0, 1, 2]
  schedule_regimes: [matched, fixed]

data:
  source_dir: data/wikitext103_raw
  prepared_dir: outputs/main_v2/prepared_data
  train_file: train.txt
  valid_file: valid.txt
  test_file: test.txt
  overwrite_prepared: false

# Bracket the low end (2L-16d, 2L-20d) to verify the frontier
# is not hitting the left edge. Fill gaps in the 2-layer family
# (44d, 52d, 60d) around where the fixed-schedule optimum sits.
model_grid:
  - name: gpt_2l_16d
    n_layer: 2
    n_head: 4
    n_embd: 16
    mlp_ratio: 4.0

  - name: gpt_2l_20d
    n_layer: 2
    n_head: 4
    n_embd: 20
    mlp_ratio: 4.0

